services:
  - type: web
    name: agente-atendimento
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: API_KEY
        sync: false
      - key: QDRANT_URL
        value: ""
